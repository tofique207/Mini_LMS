{% extends 'base.html' %}

{% block title %}Add Attendance{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2>Add Attendance</h2>
    <div class="card mt-3">
        <div class="card-body">
            <form action="{{ url_for('attendance.add_attendance') }}" method="POST">
                
                <div class="mb-3">
                    <label for="student_id" class="form-label">Student</label>
                    <select class="form-select" id="student_id" name="student_id" required>
                        <option value="" disabled selected>Select a student</option>
                        {% for student in students %}
                        <option value="{{ student.id }}">{{ student.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="mb-3">
                    <label for="course_id" class="form-label">Course</label>
                    <select class="form-select" id="course_id" name="course_id" required>
                        <option value="" disabled selected>Select a course</option>
                        {% for course in courses %}
                        <option value="{{ course.id }}">{{ course.title }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label for="attended" class="form-label">Attended Classes</label>
                    <input type="number" class="form-control" id="attended" name="attended" min="0" required>
                </div>

                <div class="mb-3">
                    <label for="total_classes" class="form-label">Total Classes</label>
                    <input type="number" class="form-control" id="total_classes" name="total_classes" min="1" required>
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-primary">Add Attendance</button>
                    <a href="{{ url_for('attendance.list_attendance') }}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
