{% extends "base.html" %}

{% block title %}Student Dashboard{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
  <div class="card shadow p-4" style="max-width: 450px; width: 100%;">
    <h3 class="text-center mb-3">Complete Your Profile</h3>

    <p class="text-muted text-center mb-4">
      Complete your setup by creating a student profile. This will activate your student account.
    </p>

    <a href="{{ url_for('students.add_student') }}" class="btn btn-primary w-100 mb-2">
      Create Student Profile
    </a>

    <a href="{{ url_for('auth.logout') }}" class="btn btn-outline-danger w-100">
      Logout
    </a>
  </div>
</div>
{% endblock %}
