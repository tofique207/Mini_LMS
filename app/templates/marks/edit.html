{% extends 'base.html' %}

{% block title %}Edit Mark{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Edit Mark</h4>
                </div>
                <div class="card-body">
                    <form action="{{ url_for('marks.edit_mark', mark_id=mark.id) }}" method="POST">
                        <div class="mb-3">
                            <label class="form-label">Student</label>
                            <input type="text" class="form-control" value="{{ mark.student.name }}" disabled readonly>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Course</label>
                            <input type="text" class="form-control" value="{{ mark.course.title }}" disabled readonly>
                        </div>

                        <div class="mb-3">
                            <label for="marks" class="form-label">Marks</label>
                            <input type="number" class="form-control" id="marks" name="marks" min="0"
                                value="{{ mark.marks }}" required>
                        </div>

                        <div class="mb-3">
                            <label for="total_marks" class="form-label">Total Marks</label>
                            <input type="number" class="form-control" id="total_marks" name="total_marks" min="1"
                                value="{{ mark.total_marks }}" required>
                        </div>

                        <div class="d-flex justify-content-between mt-4">
                            <a href="{{ url_for('marks.list_marks') }}" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary">Update Mark</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
